<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>해충 제보 — 지도</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <div class="wrap">
      <div class="screen screen-map">

        <div class="head">
          <div class="htop">
            <div class="brand">해충 제보</div>
            <div class="seg">
              <a class="segb" href="/">제보</a>
              <a class="segb segb-on" href="/map">지도</a>
            </div>
          </div>
          <div class="chips">
            <div class="chip chip-on">오늘</div>
            <div class="chip">전체 해충</div>
            <div class="chip">위험 높음만</div>
          </div>
        </div>

        <div class="map">
          <div id="kakaomap" class="kakaomap"></div>

          <div id="placeholder" class="placeholder">
            <div class="wm">지도 불러오는 중…</div>
          </div>

          <div class="legend">
            <div class="lg"><span class="lgdot" style="background:#27D3A6;"></span>낮음</div>
            <div class="lg"><span class="lgdot" style="background:#FFB13C;"></span>중간</div>
            <div class="lg"><span class="lgdot" style="background:#FF5B52;"></span>높음</div>
          </div>
        </div>

        <div class="sheet">
          <div class="handle"></div>
          <div class="selrow">
            <div>
              <div class="selname" id="selname">제보 지도</div>
              <div class="selmeta" id="selmeta">지역별 제보를 불러오는 중…</div>
            </div>
            <div class="risk risk-none" id="selrisk">대기</div>
          </div>
          <div class="hint" id="selhint">지역별 제보 마커를 지도에 표시합니다. 마커를 누르면 상세가 보입니다.</div>
          <div>
            <div class="listlab">다른 지역 제보</div>
            <div class="list" id="reportlist">
              <div class="li li-last"><span class="lidot" style="background:#3A4A44;"></span><span class="lic"><span class="lit">불러오는 중…</span><span class="lis">—</span></span><span class="litime"></span></div>
            </div>
          </div>
        </div>

      </div>
    </div>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="{{ url_for('static', filename='map.js') }}"></script>
  </body>
</html>
